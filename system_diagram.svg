<line x1="538" y1="228" x2="473" y2="378" stroke="#475569" stroke-width="2" marker-end="url(#ah-slate)"/>
<text x="519" y="306" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#475569">start / stop / switch</text>

