<line x1="416" y1="143" x2="445" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#ah-slate)"/>
<text x="430" y="141" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#475569">PredictionOutput</text>

