<path d="M 860 422 Q 700 450 553 440" fill="none" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-green)"/>
<text x="710" y="453" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#16A34A">joint actions  (8-step horizon)</text>

<!-- GrootRobotController → SO-101 (USB serial) -->
<path d="M 553 462 Q 700 490 860 516" fill="none" stroke="#9333EA" stroke-width="2" marker-end="url(#ah-purple)"/>
<text x="710" y="488" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#9333EA">joint commands  (USB serial)</text>

