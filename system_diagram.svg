<line x1="416" y1="254" x2="445" y2="210" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah-muted)"/>
<text x="435" y="239" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#94A3B8">voice cmd</text>

