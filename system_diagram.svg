<!-- Qwen → StreamingIntentPredictor (JSON result, dashed return) -->
<path d="M 860 160 Q 635 138 416 155" fill="none" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-amber)"/>
