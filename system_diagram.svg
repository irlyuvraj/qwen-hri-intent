<path d="M 1053 582 Q 1053 635 620 635 Q 30 635 30 162" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ah-blue)"/>
<text x="540" y="630" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#2563EB">shared USB camera feed</text>

